<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fast Code</title>
<link rel="icon" href="/static/favicon.svg?v=1" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/static/favicon.svg?v=1" />
<script>
(function () {
  try {
    if (localStorage.getItem("fast-code-theme") === "light") {
      document.documentElement.setAttribute("data-theme", "light");
    }
  } catch (e) {}
})();
</script>
<link rel="stylesheet" href="/static/style.css?v=13" />
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="logo" title="Fast Code">
        <img src="/static/favicon.svg?v=1" width="28" height="28" alt="" decoding="async" />
      </div>
      <h2>Fast Code</h2>
    </div>
    <button id="new-chat-btn">+ New Chat</button>
    <ul id="conversation-list"></ul>
  </aside>

  <main>
    <header>
      <h3>Chat</h3>
      <button type="button" id="theme-toggle" class="icon-btn theme-toggle" title="Switch theme" aria-label="Switch between dark and light theme">
        <span class="theme-icon theme-icon-moon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
        <span class="theme-icon theme-icon-sun" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </span>
      </button>
      <select id="model-select" aria-label="Model">
        <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
        <option value="claude-opus-4-20250514">Claude Opus 4</option>
        <option value="claude-haiku-3-20250307">Claude 3 Haiku</option>
        <option value="gpt-4o-mini">GPT-4o mini</option>
        <option value="gpt-5-mini">GPT-5 mini</option>
      </select>
      <select id="chat-mode-select" aria-label="Chat mode" title="Ask: read-only answers. Plan: explore and outline steps. Agent: full tools.">
        <option value="agent">Agent</option>
        <option value="ask">Ask</option>
        <option value="plan">Plan</option>
      </select>
      <div class="spacer"></div>
      <label class="toggle-wrap">
        <input type="checkbox" id="auto-approve-toggle" />
        Auto-approve tools
      </label>
      <span id="activity-label" class="activity-label" aria-live="polite"></span>
      <div id="status-indicator" title="Connected"></div>
    </header>

    <div id="messages">
      <div id="empty-state">
        <h2>What can I help you build?</h2>
        <p>Ask me to write code, create apps, debug issues, or run commands. Type <strong>/</strong> to reference a file.</p>
      </div>
      <div id="chat-scroll-anchor" aria-hidden="true"></div>
    </div>

    <form id="chat-form">
      <div id="file-autocomplete"></div>
      <textarea id="chat-input" placeholder="Message Fast Code... (type / for files)" rows="1"></textarea>
      <button type="submit" id="send-btn" class="btn-primary">Send</button>
    </form>
  </main>
</div>

<div id="delete-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="delete-modal-heading" aria-describedby="delete-modal-desc">
  <div class="modal-card">
    <h4 id="delete-modal-heading">Delete conversation?</h4>
    <p id="delete-modal-desc" class="modal-desc">This removes the chat from this device. This cannot be undone.</p>
    <div class="modal-actions">
      <button type="button" id="delete-modal-cancel" class="btn-modal btn-modal-secondary">Cancel</button>
      <button type="button" id="delete-modal-confirm" class="btn-modal btn-modal-danger">Delete</button>
    </div>
  </div>
</div>

<script src="/static/app.js?v=13"></script>
</body>
</html>
